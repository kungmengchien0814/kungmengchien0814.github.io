<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龔孟謙 | 個人網站</title>
    <style>
        /* 基礎樣式：仿 Liench 的淡灰色背景 */
        body {
            background-color: #f7f9fc;
            color: #333d47;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            line-height: 1.8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        /* 頂部標題 */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            color: #1b4332;
            font-size: 2.6rem;
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #52b788;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: block;
        }

        /* Liench 風格卡片 */
        .card {
            background: #ffffff;
            border-radius: 24px; /* 大圓角 */
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04); /* 極輕陰影 */
            border: 1px solid #edf2f7;
        }

        h2 {
            color: #2d6a4f;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        /* 標籤樣式 */
        .tag-box {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .tag {
            background: #f0fdf4;
            color: #166534;
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid #dcfce7;
        }

        /* 內容文字 */
        p {
            margin: 0 0 15px 0;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            color: #a0aec0;
            font-size: 0.85rem;
        }

        /* 手機適應 */
        @media (max-width: 600px) {
            .container { margin: 30px auto; }
            .card { padding: 30px 20px; }
            header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <span class="subtitle">PORTFOLIO</span>
            <h1>龔孟謙</h1>
            <p style="color: #718096; margin-top: 10px;">國立勤益科技大學 · 智慧自動化系</p>
        </header>

        <div class="card">
            <h2>👤 關於我</h2>
            <p>我目前就讀於智慧自動化系，專注於將人工智慧、程式設計與自動化系統結合，並應用於實際工程專題中。</p>
            <p>在學習路上，我抱持積極主動的態度，具備獨立思考與解決問題的能力。未來致力於在科技與工程領域持續深耕，將所學轉化為實際社會價值。</p>
        </div>

        <div class="card">
            <h2>🛹 專業與特長</h2>
            <div class="tag-box">
                <span class="tag">程式開發</span>
                <span class="tag">人工智慧應用</span>
                <span class="tag">自動化系統</span>
                <span class="tag">攝影與剪輯</span>
                <span class="tag">社群營運</span>
                <span class="tag">滑板社幹部</span>
                <span class="tag">吉他彈唱</span>
            </div>
        </div>

        <div class="card">
            <h2>✨ 個人特質</h2>
            <div class="tag-box">
                <span class="tag">積極主動</span>
                <span class="tag">邏輯思維</span>
                <span class="tag">團隊合作</span>
                <span class="tag">危機處理</span>
                <span class="tag">細節控</span>
                <span class="tag">活潑熱情</span>
            </div>
        </div>

        <footer>
            &copy; 2026 KUNG MENG-CHIEN. Built with GitHub Pages.
        </footer>
    </div>

</body>
</html>
